{% extends _snake_access_internal_base_template %}

{% block snake_access_content %}

    <div class="container">
        <form method="POST">

            <h1>{{ display_language.get("LOGIN-h1", "Log in") }}</h1>

            <div class="form-group sc-box sc-box-light">

                <div class="input-group mb-3">
                    <span class="input-group-text">
                        {{ display_language.get("LOGIN-user", "User") }}
                    </span>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-control"
                    placeholder="{{ display_language.get("LOGIN-user_placeholder", "Enter your username") }}"/>

                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text">
                        {{ display_language.get("LOGIN-password", "Password") }}
                    </span>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="{{ display_language.get("LOGIN-password_placeholder", "Enter your password") }}"/>

                    <button
                        type="button"
                        class="btn btn-dark"
                        data-toggle-password
                        data-password-input="password">
                        <span class="material-symbols-outlined">visibility</span>
                    </button>
                
                </div>
            </div>

            <button
                class="btn btn-dark w-100"
                type="submit">
                    {{ display_language.get("LOGIN-login", "Log In") }}
            </button>
        </form>
    </div>

{% endblock %}
