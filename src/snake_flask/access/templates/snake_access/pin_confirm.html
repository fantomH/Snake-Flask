{% extends _snake_access_internal_base_template %}

{% block snake_access_content %}

    <div class="container py-5" style="max-width: 420px;">

        <h2 class="mb-4">
            {{ display_language.get("SNAKE_ACCESS-confirm_password", "Confirm password") }}
        </h2>

        <form method="POST">

            <div class="form-group">
                <input
                    type="password"
                    id="pin"
                    name="pin"
                    class="form-control"
                    placeholder="{{ display_language.get("SNAKE_ACCESS-enter_your_pin", "Enter your PIN") }}"/>

                <br />
                <div align="right">
                    <button class="btn btn-dark" type="submit">{{ display_language.get("SNAKE_ACCESS-confirm", "Confirm") }}</button>
                </div>
            </div>

        </form>
    </div>

{% endblock %}
