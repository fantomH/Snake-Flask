{% extends _snake_access_internal_base_template %}

{% block snake_access_content %}

    <div class="container py-5" style="max-width: 420px;">

        <h2 class="mb-4">
            {{ display_language.get("SNAKE_ACCESS-PIN-pin_verification", "PIN Verification") }}
        </h2>

        <p>
            {{ display_language.get("SNAKE_ACCESS-PIN-enter_pin_to_continue", "Enter your PIN to continue.") }}
        </p>

        <form method="post">

            <div class="mb-3">

                <label
                    for="pin"
                    class="form-label"
                >
                    {{ display_language.get("SNAKE_ACCESS-PIN-pin", "PIN") }}
                </label>

                <input
                    class="form-control form-control-lg text-center"
                    id="pin"
                    name="pin"
                    type="password"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    minlength="{{ pin_length }}"
                    maxlength="{{ pin_length }}"
                    pattern="[0-9]*"
                    autofocus
                    required
                >

            </div>

            <button
                class="btn btn-dark w-100"
                type="submit"
            >
                {{ display_language.get("SNAKE_ACCESS-PIN-verify", "Verify") }}
            </button>

        </form>

    </div>

{% endblock %}
