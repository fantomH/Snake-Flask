{% extends _internal_base_template %}

{% block snake_content %}

  <div class="sc-container-fluid">

    <h1>{{ display_language.get("SNAKEQUIZ-INDEX-h1", "Questionnaires") }}</h1>

    <div class="list-group mt-4">
      {% for questionnaire in questionnaires %}
         <a href="{{ url_for('snake_quiz.take_quiz', name=questionnaire.name) }}"
            class="list-group-item list-group-item-action">
              {{ questionnaire.title }}
         </a>
      {% endfor %}
    </div>

  </div>

{% endblock %}
