<div class="card mb-3 snake-list-card">
    <div class="card-body">

        <h5 class="card-title">
            <a href="{{ item.url }}" target="_blank">
                {{ item.name }}
            </a>
        </h5>

        <p class="card-text">
                {{ item.description }}
        </p>

        <p class="text-muted mb-0">
            {{ item.tags }}
        </p>

    </div>
</div>
