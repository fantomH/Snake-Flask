<!DOCTYPE html>
<html lang="en">
    <head>
      <meta charset="utf-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->

      {% if title %}
          <title>{{title}}</title>
      {% else %}
          <title>TITLE</title>
      {% endif %}

      {% block head %}

      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
            rel="stylesheet" 
            integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
            crossorigin="anonymous">
      <link rel="stylesheet" 
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
      <link rel="stylesheet" href="{{ url_for('snake_common.static', filename='snake-common.css') }}" />
      {% endblock %}

      {% block css %}{% endblock %}

      {% block script_head %}{% endblock %}

    </head>
    <body>

      {% include "navbar.html" %}

      <main>
        {% block content %}{% endblock %}
      </main>

      {% include "flash.html" %}

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
              integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" 
              crossorigin="anonymous"></script>
      <script src="{{ url_for('snake_common.static', filename='snake-common.js') }}"></script>

      {% block scripts_footer %}{% endblock %}

    </body>
</html>
