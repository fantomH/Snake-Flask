<style>
    #{{ list.list_id }} .snake-list-wrapper {
        width: 100%;
    }

    #{{ list.list_id }} .snake-list-body {
        width: 100%;
    }

    #{{ list.list_id }} .snake-list-search {
        min-width: 250px;
    }

    #{{ list.list_id }} .snake-list-card {
        overflow: hidden;
    }
</style>

<div
    id="{{ list.list_id }}"
    class="snake-list"
    data-url="{{ list.data_url }}"
    data-lang-page="Page"
    data-lang-of="of"
    data-lang-result="result"
    data-lang-results="results"
>
    <div class="d-flex justify-content-between mb-2">
        <input
            type="text"
            class="form-control w-25 snake-list-search"
            placeholder="Search..."
            value="{{ list.query }}"
            autocomplete="off"
        >

        <select class="form-select w-auto snake-list-page-size">
            {% for option in list.per_page_options %}
                <option
                    value="{{ option }}"
                    {% if option == list.per_page %}selected{% endif %}
                >
                    {{ option }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="snake-list-wrapper">
        <div class="snake-list-body">
            {{ list.render_body() }}
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-2">
        <button
            type="button"
            class="btn btn-sm btn-dark snake-list-prev"
        >
            &lt; Previous
        </button>

        <span class="snake-list-info"></span>

        <button
            type="button"
            class="btn btn-sm btn-dark snake-list-next"
        >
            Next &gt;
        </button>
    </div>
</div>

<script>
(function () {

    const list = document.getElementById(
        {{ list.list_id | tojson }}
    );

    if (!list || list.dataset.initialized === "true") {
        return;
    }

    list.dataset.initialized = "true";

    const dataUrl = list.dataset.url;

    const searchInput = list.querySelector(
        ".snake-list-search"
    );

    const pageSizeSelect = list.querySelector(
        ".snake-list-page-size"
    );

    const body = list.querySelector(
        ".snake-list-body"
    );

    const previousButton = list.querySelector(
        ".snake-list-prev"
    );

    const nextButton = list.querySelector(
        ".snake-list-next"
    );

    const info = list.querySelector(
        ".snake-list-info"
    );

    let page = 1;
    let searchTimer = null;
    let requestController = null;

    if (
        !dataUrl
        || !searchInput
        || !pageSizeSelect
        || !body
        || !previousButton
        || !nextButton
        || !info
    ) {
        return;
    }


    /*
     * Return the state element from the current list body.
     */
    function getBodyData() {

        return body.querySelector(
            ".snake-list-data"
        );

    }


    /*
     * Synchronize pagination controls with server-rendered state.
     */
    function syncFromBody() {

        const data = getBodyData();

        if (!data) {
            return;
        }

        page = parseInt(
            data.dataset.page || "1",
            10
        );

        const totalPages = parseInt(
            data.dataset.totalPages || "1",
            10
        );

        const totalItems = parseInt(
            data.dataset.totalItems || "0",
            10
        );

        const hasPrevious =
            data.dataset.hasPrevious === "true";

        const hasNext =
            data.dataset.hasNext === "true";

        previousButton.disabled = !hasPrevious;
        nextButton.disabled = !hasNext;

        const pageLabel =
            list.dataset.langPage || "Page";

        const ofLabel =
            list.dataset.langOf || "of";

        const resultLabel =
            totalItems === 1
                ? list.dataset.langResult || "result"
                : list.dataset.langResults || "results";

        info.textContent =
            `${pageLabel} ${page} ${ofLabel} ${totalPages}`
            + ` — ${totalItems} ${resultLabel}`;

    }


    /*
     * Build the AJAX URL while preserving existing application parameters.
     *
     * Example:
     *
     *     /tools/rsss/data/?rsss_name=axio
     *
     * becomes:
     *
     *     /tools/rsss/data/?rsss_name=axio
     *         &sl_search=g
     *         &sl_page=1
     *         &sl_page_size=10
     */
    function buildUrl() {

        const url = new URL(
            dataUrl,
            window.location.origin
        );

        url.searchParams.set(
            "sl_search",
            searchInput.value
        );

        url.searchParams.set(
            "sl_page",
            page
        );

        url.searchParams.set(
            "sl_page_size",
            pageSizeSelect.value
        );

        return url.toString();

    }


    /*
     * Fetch and replace the refreshable list body.
     */
    async function load() {

        if (requestController) {
            requestController.abort();
        }

        requestController = new AbortController();

        try {

            const response = await fetch(
                buildUrl(),
                {
                    headers: {
                        "X-Snake-List": "1",
                    },
                    signal: requestController.signal,
                }
            );

            if (!response.ok) {
                throw new Error(
                    `SnakeList request failed: ${response.status}`
                );
            }

            body.innerHTML = await response.text();

            syncFromBody();

        } catch (error) {

            if (error.name !== "AbortError") {
                console.error(error);
            }

        }

    }


    /*
     * Search after a short delay.
     */
    searchInput.addEventListener(
        "input",
        function () {

            clearTimeout(searchTimer);

            searchTimer = setTimeout(
                function () {

                    page = 1;
                    load();

                },
                300
            );

        }
    );


    /*
     * Change the number of results displayed per page.
     */
    pageSizeSelect.addEventListener(
        "change",
        function () {

            page = 1;
            load();

        }
    );


    /*
     * Load the previous page.
     */
    previousButton.addEventListener(
        "click",
        function () {

            if (page <= 1) {
                return;
            }

            page -= 1;
            load();

        }
    );


    /*
     * Load the next page.
     */
    nextButton.addEventListener(
        "click",
        function () {

            if (nextButton.disabled) {
                return;
            }

            page += 1;
            load();

        }
    );


    syncFromBody();

})();
</script>
